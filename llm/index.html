<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />

        <title>Comment marche un LLM — explication visuelle</title>
        <link

        <script

        ></script>
        <script
            src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"

        ></script>
        <script
            src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"

            crossorigin="anonymous"
        ></script>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #f4f1ea;
                --ink: #1c1b18;
                --muted: #7a7670;
                --line: #ddd7cd;
                --paper: #fffefb;
                --c-system: #c26020;
                --c-user: #2557c2;
                --c-ai: #1a7b4a;
                --c-perso: #0e8090;
                --c-skill: #a03070;
                --c-tool: #a07820;
                --c-think: #8050d0;
                --c-cache: #888888;
                --c-compact: #b85b45;
            }
            html,
            body {
                height: 100%;
                font-family: "Outfit", sans-serif;
                background: var(--bg);
                color: var(--ink);
                -webkit-font-smoothing: antialiased;
            }
            body {
                overflow-x: hidden;
            }
            #root {
                min-height: 100%;
            }

            /* TOP bar */
            .topbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 50;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 28px;
                background: linear-gradient(
                    to bottom,
                    rgba(244, 241, 234, 0.97),
                    rgba(244, 241, 234, 0.7)
                );
                backdrop-filter: blur(8px);
            }
            .brand {
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.01em;
                color: var(--ink);
            }
            .brand .dot {
                display: inline-block;
                width: 8px;
                height: 8px;
                background: var(--ink);
                border-radius: 2px;
                margin-right: 8px;
                vertical-align: middle;
            }
            .act-pill {
                font-size: 10.5px;
                font-weight: 700;
                color: var(--muted);
                letter-spacing: 0.1em;
                text-transform: uppercase;
                font-variant-numeric: tabular-nums;
            }
            .act-pill .num {
                color: var(--ink);
            }

            /* Progress rail (right side) */
            .rail {
                position: fixed;
                top: 50%;
                right: 24px;
                transform: translateY(-50%);
                z-index: 40;
                display: flex;
                flex-direction: column;
                gap: 9px;
                align-items: center;
            }
            .rail-tick {
                width: 5px;
                height: 5px;
                border-radius: 3px;
                background: #d8d2c8;
                cursor: pointer;
                transition: all 0.25s;
                border: none;
                padding: 0;
            }
            .rail-tick:hover {
                background: #999;
            }
            .rail-tick.done {
                background: #b0bac8;
            }
            .rail-tick.active {
                height: 22px;
                background: var(--ink);
            }

            /* HERO / FIRST SCENE */
            .hero {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 60px 24px;
                gap: 18px;
                text-align: center;
            }
            .hero h1 {
                font-size: clamp(40px, 6vw, 76px);
                font-weight: 800;
                line-height: 1.05;
                letter-spacing: -0.02em;
                max-width: 14ch;
            }
            .hero .sub {
                font-size: 18px;
                color: var(--muted);
                max-width: 48ch;
                line-height: 1.55;
            }
            .hero .cta {
                margin-top: 24px;
                font-size: 13px;
                color: var(--muted);
                letter-spacing: 0.04em;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .hero .cta .arrow {
                display: inline-block;
                width: 1px;
                height: 18px;
                background: var(--muted);
                position: relative;
                animation: hereflow 1.6s ease-in-out infinite;
            }
            @keyframes hereflow {
                0%,
                100% {
                    opacity: 0.4;
                    transform: translateY(0);
                }
                50% {
                    opacity: 1;
                    transform: translateY(4px);
                }
            }

            /* GENERIC ACT */
            .act {
                position: relative;
            }
            .act-inner {
                position: sticky;
                top: 0;
                height: 100vh;
                display: grid;
                grid-template-columns: minmax(360px, 42%) 1fr;
                align-items: center;
                gap: 0;
            }
            .act-text {
                padding: 80px 50px 80px 60px;
                max-width: 560px;
                justify-self: end;
            }
            .act-eyebrow {
                font-size: 10.5px;
                font-weight: 700;
                letter-spacing: 0.16em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 14px;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .act-eyebrow .num {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 22px;
                height: 22px;
                border-radius: 50%;
                color: #fff;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0;
            }
            .act h2 {
                font-size: clamp(32px, 3.6vw, 48px);
                font-weight: 800;
                line-height: 1.08;
                letter-spacing: -0.015em;
                margin-bottom: 18px;
                text-wrap: balance;
            }
            .act-lede {
                font-size: 17px;
                line-height: 1.55;
                color: #3a3834;
                text-wrap: pretty;
            }
            .act-lede + .act-lede {
                margin-top: 14px;
            }
            .act-lede strong {
                font-weight: 600;
                color: var(--ink);
            }
            .act-lede em {
                font-style: italic;
                color: #5a5752;
            }
            .act-note {
                margin-top: 22px;
                padding: 13px 16px;
                border-left: 3px solid var(--ink);
                font-size: 14px;
                line-height: 1.55;
                color: #3a3834;
                background: rgba(255, 255, 255, 0.6);
            }
            .act-note strong {
                font-weight: 600;
                color: var(--ink);
            }

            .act-stage {
                position: relative;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 60px 80px 60px 0;
                overflow: hidden;
            }

            /* common token chip */
            .tok {
                display: inline-block;
                padding: 2px 7px;
                margin: 2px;
                border-radius: 3px;
                font-family: "Fira Code", monospace;
                font-size: 11.5px;
                line-height: 1.4;
                background: rgba(0, 0, 0, 0.05);
                color: var(--ink);
                border: 1px solid rgba(0, 0, 0, 0.08);
                letter-spacing: -0.01em;
            }
            .tok.user {
                background: rgba(37, 87, 194, 0.08);
                color: var(--c-user);
                border-color: rgba(37, 87, 194, 0.25);
            }
            .tok.ai {
                background: rgba(26, 123, 74, 0.08);
                color: var(--c-ai);
                border-color: rgba(26, 123, 74, 0.25);
            }
            .tok.sys {
                background: rgba(194, 96, 32, 0.08);
                color: var(--c-system);
                border-color: rgba(194, 96, 32, 0.25);
            }
            .tok.think {
                background: rgba(128, 80, 208, 0.08);
                color: var(--c-think);
                border-color: rgba(128, 80, 208, 0.25);
            }
            .tok.tool {
                background: rgba(160, 120, 32, 0.08);
                color: var(--c-tool);
                border-color: rgba(160, 120, 32, 0.25);
            }
            .tok.skill {
                background: rgba(160, 48, 112, 0.08);
                color: var(--c-skill);
                border-color: rgba(160, 48, 112, 0.25);
            }
            .tok.perso {
                background: rgba(14, 128, 144, 0.08);
                color: var(--c-perso);
                border-color: rgba(14, 128, 144, 0.25);
            }
            .tok.cached {
                background: #edeae3;
                color: #999;
                border-color: #ddd7cd;
            }

            /* The "machine" / function */
            .fn-box {
                display: inline-flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                border: 2px solid var(--ink);
                background: #fff;
                padding: 22px 26px;
                min-width: 140px;
                border-radius: 14px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
                position: relative;
            }
            .fn-box.tall {
                padding: 32px 28px;

            .fn-box .label {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 6px;
            }
            .fn-box .name {
                font-size: 22px;
                font-weight: 800;
                letter-spacing: -0.01em;
            }
            .fn-box .icon {
                font-size: 28px;
                margin-bottom: 6px;

            /* Paper / context block */
            .paper {
                background: var(--paper);
                border: 1.5px solid var(--line);
                border-radius: 10px;
                position: relative;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);

            .paper.scroll {

            .paper-row {

                border-bottom: 1px solid #f0ebe2;
                border-left: 3px solid;
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .paper-row:last-child {
                border-bottom: none;
            }
            .row-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
            }
            .row-badge {
                font-size: 9px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                padding: 2px 7px;
                border-radius: 8px;
                color: #fff;
                white-space: nowrap;

            .row-meta {

            .row-text {

            /* layered context (acte 4) */

            .layer-info {

            .layer-name {

                color: var(--ink);

            .layer-desc {
                font-size: 11px;
                color: var(--muted);
                line-height: 1.35;
            }
            .layer-tok {
                font-size: 10px;
                font-family: "Fira Code", monospace;
                color: var(--muted);
                white-space: nowrap;
                flex-shrink: 0;
            }

            /* Latency chart */
            .chart-row {
                display: flex;
                align-items: flex-end;
                gap: 8px;
                height: 160px;
                padding-top: 20px;
            }
            .chart-bar {
                flex: 1;
                max-width: 50px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
            }
            .bar-fill {
                width: 100%;
                border-radius: 4px 4px 0 0;
                transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
                position: relative;
            }
            .bar-fill .val {
                position: absolute;
                top: -18px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 10px;
                font-family: "Fira Code", monospace;
                color: var(--muted);
            }
            .bar-label {
                font-size: 10px;
                color: var(--muted);

            }

            /* SVG flow accents */
            .flow-arrow {
                stroke: var(--muted);
                stroke-width: 1.5;
                fill: none;
                marker-end: url(#arrM);
            }
            .flow-arrow.active {
                stroke: var(--c-user);
                stroke-width: 2;
            }

            /* Dashed cache marker */
            .cache-mark {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                font-size: 9.5px;
                font-weight: 600;
                color: var(--c-cache);
                background: #edeae3;
                padding: 1px 6px;
                border-radius: 8px;
                border: 1px dashed #bbb6ac;
            }

            /* ENDING */
            .outro {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 28px;
                padding: 60px 24px;
                text-align: center;
            }
            .outro h2 {
                font-size: clamp(28px, 3.5vw, 44px);
                font-weight: 800;
                line-height: 1.1;
                max-width: 22ch;
                letter-spacing: -0.015em;
                text-wrap: balance;
            }
            .outro .key {
                font-size: 18px;
                color: var(--muted);
                max-width: 50ch;
                line-height: 1.55;
            }

            /* Recap diagram */
            .recap-wrap {
                padding: 16px 0;
                display: flex;
                flex-direction: column;
                gap: 8px;
                width: 100%;
                max-width: 500px;
            }

            /* helpers */
            @keyframes pulse {
                0%,
                100% {
                    box-shadow: 0 0 0 0 rgba(37, 87, 194, 0);
                }
                50% {
                    box-shadow: 0 0 0 6px rgba(37, 87, 194, 0.15);
                }
            }
            .pulse {
                animation: pulse 1.6s ease-in-out infinite;
            }

            /* Long-section helper: enables sticky scroll-driven animations on desktop,
               collapses to natural height on mobile (where sticky is disabled). */
            .act-long {
                height: 200vh;
            }
            .act-long.lg {
                height: 250vh;
            }
            .act-long.xl {
                height: 300vh;
            }
            .act-long.xxl {
                height: 350vh;
            }

            /* Responsive: stack on small */
            @media (max-width: 900px) {
                .act-inner {
                    grid-template-columns: 1fr;
                    height: auto;
                    min-height: 100vh;
                    padding: 80px 0;
                }
                .act-text {
                    padding: 30px 24px;
                    justify-self: stretch;
                    max-width: none;
                }
                .act-stage {
                    padding: 30px 24px;
                    height: auto;
                    min-height: 60vh;
                }
                .rail {
                    display: none;
                }
            }

            /* Tablet & phone: shrink scroll runways (stacked content is shorter)
               and let visuals breathe out of their stage box. */
            @media (max-width: 720px) {
                .act-long {
                    height: 220vh;
                }
                .act-long.lg {
                    height: 240vh;
                }
                .act-long.xl {
                    height: 300vh;
                }
                .act-long.xxl {
                    height: 340vh;
                }
                .act-stage {
                    overflow: visible;
                    padding: 20px 18px 40px;
                }
                .act-stage > *,
                .act-stage > * > * {
                    max-width: 100% !important;
                    box-sizing: border-box;
                }
                .topbar {
                    padding: 12px 18px;
                }
                .act-pill {
                    font-size: 10px;
                }
            }

            /* Phone scale-down */
            @media (max-width: 480px) {
                .act-text {
                    padding: 24px 18px;
                }
                .act-eyebrow {
                    font-size: 10px;
                }
                .fn-box {
                    padding: 18px 20px;
                    min-width: 120px;
                }
                .fn-box.tall {
                    padding: 22px 20px;
                }
                .fn-box .name {
                    font-size: 18px;
                }
                .tok {
                    font-size: 11px;
                }
                .hero {
                    padding: 60px 18px;
                }
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="text/babel">
            const { useState, useEffect, useRef, useMemo, useCallback } = React;

            /* ─── Hook: scroll progress within element [0..1] mapped to visible region ─── */
            function useScrollProgress(ref) {
                const [p, setP] = useState(0);
                useEffect(() => {
                    const tick = () => {
                        if (!ref.current) return;
                        const r = ref.current.getBoundingClientRect();
                        const wh = window.innerHeight;
                        // progress is 0 when section enters bottom, 1 when section's bottom hits top
                        const total = r.height - wh;
                        if (total <= 0) {
                            setP(r.top < 0 ? 1 : 0);
                            return;
                        }
                        const scrolled = -r.top;
                        setP(Math.max(0, Math.min(1, scrolled / total)));
                    };
                    tick();
                    window.addEventListener("scroll", tick, { passive: true });
                    window.addEventListener("resize", tick);
                    return () => {
                        window.removeEventListener("scroll", tick);
                        window.removeEventListener("resize", tick);
                    };
                }, []);
                return p;
            }

            /* ─── Hook: which act is currently dominant in viewport ─── */
            function useActiveAct(actIds) {
                const [active, setActive] = useState(0);
                useEffect(() => {
                    const tick = () => {
                        const mid = window.innerHeight / 2;
                        let best = 0,
                            bestDist = Infinity;
                        actIds.forEach((id, i) => {
                            const el = document.getElementById(id);
                            if (!el) return;
                            const r = el.getBoundingClientRect();
                            const center = r.top + r.height / 2;
                            const dist = Math.abs(center - mid);
                            if (r.top < mid && r.bottom > mid) {
                                if (dist < bestDist) {
                                    bestDist = dist;
                                    best = i;
                                }
                            }
                        });
                        setActive(best);
                    };
                    tick();
                    window.addEventListener("scroll", tick, { passive: true });
                    return () => window.removeEventListener("scroll", tick);
                }, [actIds]);
                return active;
            }

            /* ─── interpolate helper ─── */
            const lerp = (a, b, t) => a + (b - a) * t;
            const clamp = (v, a = 0, b = 1) => Math.max(a, Math.min(b, v));
            const seg = (p, s, e) => clamp((p - s) / (e - s));

            /* ════════════════════════════════════════════════
   ACT 1 — Text in / text out
═══════════════════════════════════════════════ */
            // Illustrative tokenizer breakdown — IDs are plausible but synthetic.
            const ACT1_TOKENIZATION = [
                { word: "Parle", parts: ["Par", "le"], ids: [3719, 273] },
                { word: "-moi", parts: ["-", "moi"], ids: [12, 4516] },
                { word: " de", parts: [" de"], ids: [283] },
                { word: " la", parts: [" la"], ids: [1109] },
                { word: " Révolution", parts: [" Rév", "olution"], ids: [29485, 8721] },
                { word: " française", parts: [" français", "e"], ids: [42067, 68] },
                { word: ".", parts: ["."], ids: [13] },
            ];
            const ACT1_TOTAL_TOKENS = ACT1_TOKENIZATION.reduce(
                (a, w) => a + w.parts.length,
                0,
            );

            function Act1() {
                const ref = useRef();
                const p = useScrollProgress(ref);

                // Four phases. Word/subtoken views crossfade sequentially (no overlap).
                const wordOp = 1 - seg(p, 0.18, 0.27);
                const subOp = seg(p, 0.3, 0.42);
                const showSubs = p > 0.28;
                const idsOp = seg(p, 0.36, 0.5);
                const counterOp = seg(p, 0.34, 0.48);
                const flowOn = p > 0.5 && p < 0.82;
                const fnEmphasis = seg(p, 0.45, 0.65);
                const outputOp = seg(p, 0.7, 0.85);
                const tokenCount = Math.floor(seg(p, 0.7, 1) * 8);

                const inputX = lerp(40, 0, seg(p, 0, 0.18));
                const inputDim = seg(p, 0.85, 1) * 0.35;
                const inputScale = lerp(1, 0.94, seg(p, 0.55, 0.7));
                const subtokenGap = lerp(0, 5, subOp);

                const aiTokens = [
                    "Bonjour",
                    "!",
                    "C'est",
                    "un",
                    "sujet",
                    "que",
                    "j'adore",
                    "...",
                ];

                return (
                    <section
                        ref={ref}
                        id="act1"
                        className="act act-long xl"
                    >
                        <div className="act-inner">
                            <div className="act-text">
                                <div className="act-eyebrow">
                                    <span
                                        className="num"
                                        style={{ background: "var(--ink)" }}
                                    >
                                        1
                                    </span>
                                    Le principe fondamental
                                </div>
                                <h2>
                                    Un LLM, c'est une fonction : du texte entre,
                                    du texte sort.
                                </h2>
                                <p className="act-lede">
                                    Pas d'agent qui réfléchit en boucle — un
                                    programme qui prend du texte et prédit la
                                    suite, un <strong>token</strong> à la fois.
                                </p>
                                <p className="act-lede">
                                    Un token n'est pas un mot, c'est un morceau
                                    de mot. C'est l'unité réelle dont parlent
                                    les modèles, pour le coût comme pour la
                                    mémoire.
                                </p>
                                <div className="act-note">
                                    Une même phrase peut faire 7 mots… et 11
                                    tokens.

            /* ════════════════════════════════════════════════
   ACT 3 — Caching
═══════════════════════════════════════════════ */
            function Act3() {
                const ref = useRef();
                const p = useScrollProgress(ref);
                // First half: latency chart grows. Second half: cache reveal — bars shrink.
                const t1 = seg(p, 0, 0.45);
                const t2 = seg(p, 0.55, 1);
                const cached = t2 > 0;

                const turns = [1, 2, 3, 4, 5];
                const noCacheLatency = turns.map((n) => 0.3 + n * 0.25); // grows linearly
                const cachedLatency = turns.map((n, i) =>
                    i === 0 ? noCacheLatency[0] : 0.35 + 0.05 * n,
                );

                return (
                    <section
                        ref={ref}
                        id="act3"
                        className="act act-long"
                    >
                        <div className="act-inner">
                            <div className="act-text">
                                <div className="act-eyebrow">
                                    <span
                                        className="num"
                                        style={{ background: "var(--c-cache)" }}
                                    >
                                        3
                                    </span>
                                    L'astuce du caching
                                </div>
                                <h2>
                                    « Mais en vrai, ce n'est pas <em>si</em>{" "}
                                    lent que ça… »
                                </h2>
                                <p className="act-lede">
                                    Si on relisait vraiment tout à chaque tour,
                                    les longues conversations seraient
                                    insupportables. En pratique, on ne le fait
                                    pas.
                                </p>
                                <p className="act-lede">
                                    <strong>Le prompt caching</strong> : la
                                    partie déjà traitée d'un tour précédent est
                                    mise en cache. Le modèle la réutilise sans
                                    tout recalculer.
                                </p>
                                <div className="act-note">
                                    Seul <strong>le nouveau bout</strong> est
                                    vraiment traité — d'où une latence à peu
                                    près constante, sauf au tout premier
                                    message.
                                </div>
                            </div>
                            <div className="act-stage">
                                <div
                                    style={{
                                        width: "100%",
                                        maxWidth: 380,
                                        display: "flex",
                                        flexDirection: "column",
                                        gap: 20,
                                    }}
                                >
                                    <div
                                        style={{
                                            fontSize: 11,
                                            letterSpacing: ".1em",
                                            textTransform: "uppercase",
                                            color: "var(--muted)",
                                            fontWeight: 700,
                                            textAlign: "center",
                                        }}
                                    >
                                        Latence par tour
                                    </div>
                                    <div className="chart-row">
                                        {turns.map((n, i) => {
                                            const target = cached
                                                ? cachedLatency[i]
                                                : noCacheLatency[i];
                                            const grown = lerp(
                                                0,
                                                target,
                                                cached ? 1 : t1,
                                            );
                                            const h = Math.round(grown * 100);
                                            return (
                                                <div
                                                    key={i}
                                                    className="chart-bar"
                                                >
                                                    <div
                                                        className="bar-fill"
                                                        style={{
                                                            height: `${h}%`,
                                                            background: cached
                                                                ? i === 0
                                                                    ? "#999"
                                                                    : "var(--c-cache)"
                                                                : "var(--c-user)",
                                                            opacity:
                                                                cached && i > 0
                                                                    ? 0.7
                                                                    : 1,
                                                        }}
                                                    >
                                                        <span className="val">
                                                            {Math.round(
                                                                target * 1000,
                                                            )}
                                                            ms
                                                        </span>
                                                    </div>
                                                    <div className="bar-label">
                                                        T{n}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    {/* Legend / paper with cached blocks */}
                                    <div
                                        className="paper"
                                        style={{
                                            padding: 0,
                                            marginTop: 10,
                                            opacity: cached ? 1 : 0.5,
                                            transition: "opacity .4s",
                                        }}
                                    >
                                        {[
                                            {
                                                r: "cached",
                                                l: "Tour 1 (cached)",
                                                c: "#888",
                                            },
                                            {
                                                r: "cached",
                                                l: "Tour 2 (cached)",
                                                c: "#888",
                                            },
                                            {
                                                r: "user",
                                                l: "Tour 3 — nouveau",
                                                c: "var(--c-user)",
                                            },
                                        ].map((x, i) => (
                                            <div
                                                key={i}
                                                className="paper-row"
                                                style={{ borderLeftColor: x.c }}
                                            >
                                                <div className="row-head">
                                                    <span
                                                        className="row-badge"
                                                        style={{
                                                            background: x.c,
                                                        }}
                                                    >
                                                        {x.l}
                                                    </span>
                                                    {x.r === "cached" && (
                                                        <span className="cache-mark">
                                                            ✓ déjà calculé
                                                        </span>
                                                    )}
                                                    {x.r !== "cached" && (
                                                        <span className="row-meta">
                                                            à calculer
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                );
            }

            /* ════════════════════════════════════════════════
   ACT 8 — Compaction
═══════════════════════════════════════════════ */
            function Act8() {
                const ref = useRef();
                const p = useScrollProgress(ref);

                // 4 phases:
                //   A 0.00–0.25  context near-empty, instruction is clear → faithful FR answer
                //   B 0.25–0.50  context near-full, instruction dilutes  → drifted EN answer
                //   C 0.50–0.75  saturation imminent (red bar)
                //   D 0.75–1.00  compaction kicks in (bar shrinks, summary appears)
                const phaseA = p < 0.25;
                const phaseB = p >= 0.25 && p < 0.5;
                const phaseC = p >= 0.5 && p < 0.75;
                const phaseD = p >= 0.75;

                const fillPct = lerp(14, 86, seg(p, 0.05, 0.45));
                const dangerPct = lerp(86, 96, seg(p, 0.5, 0.65));
                const compactPct = lerp(96, 28, seg(p, 0.75, 0.9));
                const finalPct = phaseD
                    ? compactPct
                    : phaseC
                      ? dangerPct
                      : fillPct;

                const instructionEmph = lerp(
                    1,
                    0.35,
                    seg(p, 0.22, 0.45),
                );
                const instructionScale = lerp(
                    1.08,
                    0.78,
                    seg(p, 0.22, 0.5),
                );

                const barColor = phaseD
                    ? "var(--c-ai)"
                    : phaseC
                      ? "var(--c-compact)"
                      : "var(--c-user)";

                return (
                    <section
                        ref={ref}
                        id="act8"
                        className="act act-long xxl"
                    >
                        <div className="act-inner">
                            <div className="act-text">
                                <div className="act-eyebrow">
                                    <span
                                        className="num"
                                        style={{
                                            background: "var(--c-compact)",
                                        }}
                                    >
                                        8
                                    </span>
                                    Contexte et compaction
                                </div>
                                <h2>
                                    Plus le contexte est plein, plus une
                                    instruction se dilue.
                                </h2>
                                <p className="act-lede">
                                    Chaque modèle a une{" "}
                                    <strong>limite de contexte</strong> (200 000
                                    tokens, par exemple). Bien avant la limite,
                                    une consigne donnée au début risque de
                                    passer à la trappe — elle est toujours là,
                                    mais noyée dans le bruit.
                                </p>
                                <p className="act-lede">
                                    Quand la fenêtre sature pour de bon, l'app
                                    déclenche une <strong>compaction</strong> :
                                    l'historique est remplacé par un résumé. On
                                    perd les détails, on peut continuer.
                                </p>
                            </div>
                            <div className="act-stage">
                                <div
                                    style={{
                                        display: "flex",
                                        flexDirection: "column",
                                        gap: 12,
                                        width: "100%",
                                        maxWidth: 420,
                                        alignItems: "stretch",
                                    }}
                                >
                                    {/* INSTRUCTION CHIP */}
                                    <div
                                        style={{
                                            alignSelf: "center",
                                            transform: `scale(${instructionScale})`,
                                            opacity: instructionEmph,
                                            padding: "8px 14px",
                                            border: "2px solid var(--c-system)",
                                            background:
                                                "rgba(194,96,32,.06)",
                                            borderRadius: 10,
                                            fontSize: 13,
                                            fontWeight: 600,
                                            color: "var(--c-system)",
                                            boxShadow: phaseA
                                                ? "0 0 0 6px rgba(194,96,32,.10)"
                                                : "none",
                                            transition:
                                                "box-shadow .45s, opacity .45s, transform .45s",
                                            whiteSpace: "nowrap",
                                        }}
                                    >
                                        ↳ Réponds toujours en français.
                                    </div>

                                    <div
                                        style={{
                                            fontSize: 11,
                                            letterSpacing: ".1em",
                                            textTransform: "uppercase",
                                            color: "var(--muted)",
                                            fontWeight: 700,
                                            marginTop: 4,
                                        }}
                                    >
                                        Fenêtre de contexte
                                    </div>
                                    <div
                                        style={{
                                            width: "100%",
                                            height: 36,
                                            background: "#EDEAE3",
                                            borderRadius: 6,
                                            overflow: "hidden",
                                            position: "relative",
                                        }}
                                    >
                                        <div
                                            style={{
                                                height: "100%",
                                                background: barColor,
                                                width: `${finalPct}%`,
                                                transition:
                                                    "all .6s cubic-bezier(.4,0,.2,1)",
                                            }}
                                        />
                                        {/* Buried instruction marker (visible once context is fuller) */}
                                        {!phaseD && finalPct > 25 && (
                                            <div
                                                style={{
                                                    position: "absolute",
                                                    top: 8,
                                                    left: "3%",
                                                    height: 20,
                                                    padding: "0 6px",
                                                    background:
                                                        "var(--c-system)",
                                                    color: "#fff",
                                                    fontSize: 9,
                                                    fontWeight: 700,
                                                    borderRadius: 3,
                                                    display: "flex",
                                                    alignItems: "center",
                                                    opacity:
                                                        seg(p, 0.18, 0.32) *
                                                        0.85,
                                                    transition: "opacity .4s",
                                                    pointerEvents: "none",
                                                    fontFamily: "Fira Code",
                                                    letterSpacing: ".05em",
                                                }}
                                            >
                                                FR
                                            </div>
                                        )}
                                        <div
                                            style={{
                                                position: "absolute",
                                                top: 0,
                                                right: "4%",
                                                height: "100%",
                                                width: 1,
                                                background: "#999",
                                            }}
                                        />
                                        <div
                                            style={{
                                                position: "absolute",
                                                top: "100%",
                                                right: "4%",
                                                marginTop: 4,
                                                fontSize: 9,
                                                color: "#999",
                                                fontFamily: "Fira Code",
                                            }}
                                        >
                                            limite
                                        </div>
                                    </div>
                                    <div
                                        style={{
                                            fontSize: 22,
                                            fontWeight: 700,
                                            fontFamily: "Fira Code",
                                            color: barColor,
                                            marginTop: 8,
                                            alignSelf: "center",
                                        }}
                                    >
                                        {Math.round(finalPct * 2000)}{" "}
                                        <span
                                            style={{
                                                fontSize: 11,
                                                color: "var(--muted)",
                                                fontWeight: 400,
                                            }}
                                        >
                                            tokens utilisés
                                        </span>
                                    </div>

                                    {/* STATE BADGE */}
                                    <div
                                        style={{
                                            minHeight: 32,
                                            alignSelf: "center",
                                            marginTop: 2,
                                        }}
                                    >
                                        {phaseA && (
                                            <div
                                                style={{
                                                    padding: "6px 12px",
                                                    background:
                                                        "rgba(26,123,74,.10)",
                                                    color: "var(--c-ai)",
                                                    border: "1.5px solid var(--c-ai)",
                                                    borderRadius: 6,
                                                    fontSize: 11,
                                                    fontWeight: 600,
                                                }}
                                            >
                                                Fidélité à l'instruction : 100%
                                            </div>
                                        )}
                                        {phaseB && (
                                            <div
                                                style={{
                                                    padding: "6px 12px",
                                                    background:
                                                        "rgba(184,91,69,.10)",
                                                    color: "var(--c-compact)",
                                                    border: "1.5px solid var(--c-compact)",
                                                    borderRadius: 6,
                                                    fontSize: 11,
                                                    fontWeight: 600,
                                                }}
                                            >
                                                Fidélité ~40% · instruction
                                                noyée
                                            </div>
                                        )}
                                        {phaseC && (
                                            <div
                                                style={{
                                                    padding: "8px 14px",
                                                    background:
                                                        "var(--c-compact)",
                                                    color: "#fff",
                                                    borderRadius: 6,
                                                    fontSize: 12,
                                                    fontWeight: 600,
                                                }}
                                            >
                                                ⚠ Saturation imminente
                                            </div>
                                        )}
                                        {phaseD && (
                                            <div
                                                style={{
                                                    padding: "10px 14px",
                                                    background:
                                                        "rgba(26,123,74,.08)",
                                                    border: "1.5px solid var(--c-ai)",
                                                    borderRadius: 8,
                                                    fontSize: 12,
                                                    color: "var(--c-ai)",
                                                    textAlign: "center",
                                                    maxWidth: 380,
                                                }}
                                            >
                                                ✓{" "}
                                                <strong>
                                                    Historique compacté.
                                                </strong>
                                                <br />
                                                <span
                                                    style={{
                                                        fontSize: 11,
                                                        color: "var(--muted)",
                                                    }}
                                                >
                                                    « Conversation sur la
                                                    Révolution française… »
                                                </span>
                                            </div>
                                        )}
                                    </div>

                                    {/* MODEL OUTPUT PREVIEW (phases A & B) */}
                                    {(phaseA || phaseB) && (
                                        <div
                                            style={{
                                                marginTop: 4,
                                                padding: "10px 14px",
                                                background:
                                                    "rgba(0,0,0,0.03)",
                                                borderRadius: 8,
                                                borderLeft: `3px solid ${phaseA ? "var(--c-ai)" : "var(--c-compact)"}`,
                                                fontSize: 12,
                                                color: "#333",
                                                fontFamily:
                                                    "Fira Code, monospace",
                                                lineHeight: 1.5,
                                            }}
                                        >
                                            {phaseA ? (
                                                <>
                                                    <span
                                                        style={{
                                                            color: "var(--c-ai)",
                                                            fontWeight: 700,
                                                        }}
                                                    >
                                                        ✓{" "}
                                                    </span>
                                                    La Révolution française a
                                                    commencé en 1789…
                                                </>
                                            ) : (
                                                <>
                                                    <span
                                                        style={{
                                                            color: "var(--c-compact)",
                                                            fontWeight: 700,
                                                        }}
                                                    >
                                                        ✗{" "}
                                                    </span>
                                                    The French Revolution
                                                    started in 1789…
                                                </>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>
                );
            }

            /* ════════════════════════════════════════════════
   ACT 9 — Recap
═══════════════════════════════════════════════ */
            function Act9() {
                return (
                    <section id="act9" className="outro">
                        <div
                            style={{
                                fontSize: 11,
                                letterSpacing: ".16em",
                                textTransform: "uppercase",
                                color: "var(--muted)",
                                fontWeight: 700,
                                marginBottom: 8,
                            }}
                        >
                            Récapitulatif
                        </div>
                        <h2>
                            Tout ce qui s'affiche, c'est du texte.
                            <br />
                            Tout ce que comprend le modèle, c'est du texte.
                        </h2>
                        <div className="recap-wrap">
                            <div className="paper">
                                {[
                                    [
                                        "Prompt système",
                                        "#fff",
                                        "var(--c-system)",
                                    ],
                                    [
                                        "Instructions personnelles",
                                        "#fff",
                                        "var(--c-perso)",
                                    ],
                                    [
                                        "Skills déclenchées",
                                        "#fff",
                                        "var(--c-skill)",
                                    ],
                                    [
                                        "Mémoires & fichiers",
                                        "#fff",
                                        "var(--c-tool)",
                                    ],
                                    [
                                        "Historique (parfois compacté)",
                                        "#fff",
                                        "var(--c-compact)",
                                    ],
                                    [
                                        "Brouillons internes (thinking)",
                                        "#fff",
                                        "var(--c-think)",
                                    ],
                                    [
                                        "Appels d'outils & résultats",
                                        "#fff",
                                        "var(--c-tool)",
                                    ],
                                    [
                                        "Ton dernier message",
                                        "#fff",
                                        "var(--c-user)",
                                    ],
                                ].map(([l, bg, c], i) => (
                                    <div
                                        key={i}
                                        className="paper-row"
                                        style={{
                                            borderLeftColor: c,
                                            background: bg,
                                        }}
                                    >
                                        <div className="row-head">
                                            <span
                                                className="row-badge"
                                                style={{ background: c }}
                                            >
                                                {l}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div
                                style={{
                                    display: "flex",
                                    justifyContent: "center",
                                    marginTop: 10,
                                }}
                            >
                                <div
                                    style={{
                                        width: 1,
                                        height: 24,
                                        background: "var(--ink)",
                                    }}
                                />
                            </div>
                            <div
                                className="fn-box"
                                style={{ alignSelf: "center" }}
                            >
                                <div className="label">Fonction</div>
                                <div className="name">LLM</div>
                            </div>
                            <div
                                style={{
                                    display: "flex",
                                    justifyContent: "center",
                                    marginTop: 10,
                                }}
                            >
                                <div
                                    style={{
                                        width: 1,
                                        height: 24,
                                        background: "var(--c-ai)",
                                    }}
                                />
                            </div>
                            <div
                                style={{
                                    textAlign: "center",
                                    padding: "12px 18px",
                                    border: "1.5px solid var(--c-ai)",
                                    borderRadius: 8,
                                    background: "rgba(26,123,74,.04)",
                                    fontSize: 14,
                                    color: "var(--c-ai)",
                                    fontWeight: 500,
                                }}
                            >
                                Tokens prédits, un par un. Voilà.
                            </div>
                        </div>
                        <p className="key" style={{ marginTop: 24 }}>
                            Tout le reste — les agents, les outils, la mémoire,
                            les skills — n'est que des manières d'ajouter du
                            texte avant que la fonction ne soit appelée.
                        </p>
                    </section>
                );
            }

            /* ════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════ */
            const ACT_IDS = [
                "hero",
                "act1",
                "act2",
                "act3",
                "act4",
                "act5",
                "act6",
                "act7",
                "act8",
                "act9",
            ];
            const ACT_NAMES = [
                "Intro",
                "Principe",
                "Conversation",
                "Caching",
                "Couches",
                "Thinking",
                "Outils",
                "Skills",
                "Compaction",
                "Recap",
            ];

            function App() {
                const active = useActiveAct(ACT_IDS);

                // Keyboard nav: arrow keys → jump to next act
                useEffect(() => {
                    const fn = (e) => {
                        if (["INPUT", "TEXTAREA"].includes(e.target?.tagName))
                            return;
                        if (e.code === "ArrowDown" || e.code === "PageDown") {
                            e.preventDefault();
                            const next = Math.min(
                                active + 1,
                                ACT_IDS.length - 1,
                            );
                            document
                                .getElementById(ACT_IDS[next])
                                ?.scrollIntoView({ behavior: "smooth" });
                        }
                        if (e.code === "ArrowUp" || e.code === "PageUp") {
                            e.preventDefault();
                            const prev = Math.max(active - 1, 0);
                            document
                                .getElementById(ACT_IDS[prev])
                                ?.scrollIntoView({ behavior: "smooth" });
                        }
                    };
                    window.addEventListener("keydown", fn);
                    return () => window.removeEventListener("keydown", fn);
                }, [active]);

                return (
                    <>
                        <div className="topbar">
                            <div className="brand">
                                <span className="dot" />
                                Comment marche un LLM ?
                            </div>
                            <div className="act-pill">
                                <span className="num">
                                    {String(active).padStart(2, "0")}
                                </span>{" "}
                                · {ACT_NAMES[active]}
                            </div>
                        </div>

                        <div className="rail">
                            {ACT_IDS.map((id, i) => (
                                <button
                                    key={id}
                                    className={`rail-tick${i === active ? " active" : i < active ? " done" : ""}`}
                                    onClick={() =>
                                        document
                                            .getElementById(id)
                                            ?.scrollIntoView({
                                                behavior: "smooth",
                                            })
                                    }
                                    title={ACT_NAMES[i]}
                                />
                            ))}
                        </div>

                        {/* HERO */}
                        <section id="hero" className="hero">
                            <div
                                style={{
                                    fontSize: 11,
                                    letterSpacing: ".18em",
                                    textTransform: "uppercase",
                                    color: "var(--muted)",
                                    fontWeight: 700,
                                }}
                            >
                                Une explication visuelle
                            </div>
                            <h1>Comment marche, vraiment, un LLM ?</h1>
                            <p className="sub">
                                Une plongée scrollée dans la mécanique des
                                grands modèles de langage — sans hype, sans
                                jargon, juste l'essentiel.
                            </p>
                            <div className="cta">
                                Scroll · ou flèches ↑↓
                                <span className="arrow" />
                            </div>
                        </section>

                        <Act1 />
                        <Act2 />
                        <Act3 />
                        <Act4 />
                        <Act5 />
                        <Act6 />
                        <Act7 />
                        <Act8 />
                        <Act9 />
                    </>
                );
            }

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
